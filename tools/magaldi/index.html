<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Hub Magaldi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:"Segoe UI",system-ui,sans-serif;
  background:#f4f7fb;
  color:#0b253a;
  padding:32px;
}

h1{
  margin:0 0 8px;
  font-size:34px;
  color:#003b70;
}

.subtitle{
  color:#5f6f82;
  margin-bottom:28px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:26px;
  box-shadow:0 4px 14px rgba(0,0,0,.10);
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,.14);
}

.icon{
  font-size:32px;
  margin-bottom:14px;
}

.title{
  font-size:20px;
  font-weight:700;
  margin-bottom:8px;
  color:#003b70;
}

.desc{
  font-size:14px;
  color:#5f6f82;
  line-height:1.5;
}

.footer{
  margin-top:34px;
  font-size:13px;
  color:#6b7a8c;
  text-align:center;
}
</style>
</head>

<body>

<h1>Hub Magaldi</h1>
<div class="subtitle">Strumenti e procedure operative per la gestione Magaldi.</div>

<div class="grid">

  <div class="card" onclick="window.open('https://enzothesun.github.io/decisione-operativa/','_blank')">
    <div class="icon">📦</div>
    <div class="title">Decisione Operativa Magaldi</div>
    <div class="desc">Gestione richieste ossigeno liquido e gassoso.</div>
  </div>

  <div class="card" onclick="window.open('https://enzothesun.github.io/hub-medicale/?view=procedure','_blank')">
    <div class="icon">📚</div>
    <div class="title">Procedure operative</div>
    <div class="desc">Accesso diretto alla libreria documentale condivisa.</div>
  </div>

</div>

<div class="footer">
  Tool sviluppato da Enzo Motti · Subject Matter Expert Mediacom
</div>

</body>
</html>
